<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <style>
    :root {
      --bg: #07111f;
      --card: rgba(15, 23, 42, 0.9);
      --card-2: rgba(30, 41, 59, 0.95);
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #f43f5e;
      --blue: #38bdf8;
      --border: rgba(148, 163, 184, 0.2);
      --shadow: 0 20px 45px rgba(2, 8, 23, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 24%),
        linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1, h2, h3 { margin-top: 0; }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 6px;
    }

    .header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #bae6fd;
      border: 1px solid rgba(56, 189, 248, 0.25);
      font-size: 0.85rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .summary-item {
      background: linear-gradient(145deg, var(--card-2), rgba(15, 23, 42, 0.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .summary-item:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.35);
    }

    .summary-item small { color: var(--muted); display: block; margin-bottom: 6px; }
    .summary-item strong { font-size: 1.3rem; }
    .income { color: var(--green); }
    .expense { color: var(--red); }
    .balance { color: var(--blue); }

    .content {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 20px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input, select, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: rgba(2, 6, 23, 0.7);
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--blue), #2563eb);
      border: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.3);
    }

    .transactions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .transaction {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.7);
    }

    .transaction .left { display: flex; flex-direction: column; }
    .transaction .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .amount { font-weight: bold; }
    .amount.income { color: var(--green); }
    .amount.expense { color: var(--red); }

    .delete-btn {
      background: linear-gradient(135deg, #fb7185, #e11d48);
      width: auto;
      padding: 8px 10px;
      font-size: 12px;
      box-shadow: none;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 22px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.45);
    }

    .logout-btn {
      background: linear-gradient(135deg, #fb7185, #e11d48);
      width: auto;
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    @media (max-width: 800px) {
      body { padding: 16px; }
      .content { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
      .transaction { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="header">
        <div>
          <h1>Finance Tracker</h1>
          <p style="margin: 4px 0 0; color: var(--muted);">Pantau pemasukan, pengeluaran, dan saldo Anda.</p>
        </div>
        <button class="logout-btn" id="logoutBtn">Keluar</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-item">
        <small>Pemasukan</small>
        <strong class="income" id="incomeTotal">Rp 0</strong>
      </div>
      <div class="summary-item">
        <small>Pengeluaran</small>
        <strong class="expense" id="expenseTotal">Rp 0</strong>
      </div>
      <div class="summary-item">
        <small>Saldo</small>
        <strong class="balance" id="balanceTotal">Rp 0</strong>
      </div>
    </div>

    <div class="content">
      <div class="card">
        <h2>Tambah Transaksi</h2>
        <form id="transactionForm">
          <select id="type" required>
            <option value="income">Pemasukan</option>
            <option value="expense">Pengeluaran</option>
          </select>
          <input type="text" id="description" placeholder="Contoh: Gaji, Belanja" required />
          <input type="number" id="amount" placeholder="Nominal" min="1" required />
          <input type="date" id="date" required />
          <button type="submit">Tambah</button>
        </form>
      </div>

      <div class="card">
        <h2>Riwayat Transaksi</h2>
        <div id="transactions" class="transactions"></div>
      </div>
    </div>
  </div>

  <script>
    // Check if user is logged in
    function checkAuth() {
      const currentUser = JSON.parse(localStorage.getItem('financeTrackerCurrentUser') || 'null');
      if (!currentUser) {
        window.location.href = 'auth.html';
      }
      return currentUser;
    }

    const currentUser = checkAuth();

    const form = document.getElementById('transactionForm');
    const transactionsEl = document.getElementById('transactions');
    const incomeTotalEl = document.getElementById('incomeTotal');
    const expenseTotalEl = document.getElementById('expenseTotal');
    const balanceTotalEl = document.getElementById('balanceTotal');
    const logoutBtn = document.getElementById('logoutBtn');

    const transactionsKey = `financeTrackerTransactions_${currentUser.id}`;
    let transactions = JSON.parse(localStorage.getItem(transactionsKey) || '[]');

    function formatRupiah(value) {
      return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        maximumFractionDigits: 0
      }).format(value);
    }

    function saveTransactions() {
      localStorage.setItem(transactionsKey, JSON.stringify(transactions));
    }

    function renderTransactions() {
      if (transactions.length === 0) {
        transactionsEl.innerHTML = '<div class="empty">Belum ada transaksi. Tambahkan yang pertama.</div>';
        return;
      }

      transactionsEl.innerHTML = '';
      transactions
        .slice()
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .forEach((tx) => {
          const item = document.createElement('div');
          item.className = 'transaction';
          item.innerHTML = `
            <div class="left">
              <strong>${tx.description}</strong>
              <div class="meta">${tx.date} • ${tx.type === 'income' ? 'Pemasukan' : 'Pengeluaran'}</div>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="amount ${tx.type === 'income' ? 'income' : 'expense'}">${tx.type === 'income' ? '+' : '-'}${formatRupiah(tx.amount)}</div>
              <button class="delete-btn" onclick="deleteTransaction('${tx.id}')">Hapus</button>
            </div>
          `;
          transactionsEl.appendChild(item);
        });
    }

    function renderSummary() {
      const income = transactions
        .filter((tx) => tx.type === 'income')
        .reduce((sum, tx) => sum + Number(tx.amount), 0);

      const expense = transactions
        .filter((tx) => tx.type === 'expense')
        .reduce((sum, tx) => sum + Number(tx.amount), 0);

      const balance = income - expense;

      incomeTotalEl.textContent = formatRupiah(income);
      expenseTotalEl.textContent = formatRupiah(expense);
      balanceTotalEl.textContent = formatRupiah(balance);
    }

    function deleteTransaction(id) {
      transactions = transactions.filter((tx) => tx.id !== id);
      saveTransactions();
      render();
    }

    function render() {
      renderSummary();
      renderTransactions();
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const type = document.getElementById('type').value;
      const description = document.getElementById('description').value.trim();
      const amount = document.getElementById('amount').value;
      const date = document.getElementById('date').value;

      if (!description || !amount || !date) return;

      transactions.unshift({
        id: crypto.randomUUID(),
        type,
        description,
        amount: Number(amount),
        date
      });

      saveTransactions();
      form.reset();
      document.getElementById('date').value = new Date().toISOString().slice(0, 10);
      render();
    });

    logoutBtn.addEventListener('click', () => {
      if (confirm('Anda yakin ingin keluar?')) {
        localStorage.removeItem('financeTrackerCurrentUser');
        window.location.href = 'auth.html';
      }
    });

    document.getElementById('date').value = new Date().toISOString().slice(0, 10);
    render();
  </script>
</body>
</html>
