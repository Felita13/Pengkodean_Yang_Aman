<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker - Autentikasi</title>
  <style>
    :root {
      --bg: #07111f;
      --card: rgba(15, 23, 42, 0.9);
      --card-2: rgba(30, 41, 59, 0.95);
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #f43f5e;
      --blue: #38bdf8;
      --border: rgba(148, 163, 184, 0.2);
      --shadow: 0 20px 45px rgba(2, 8, 23, 0.35);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 24%),
        linear-gradient(135deg, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 40px 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .auth-card h1 {
      text-align: center;
      margin: 0 0 30px 0;
      font-size: 1.8rem;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .form-group {
      display: grid;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: rgba(2, 6, 23, 0.7);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: linear-gradient(135deg, var(--blue), #2563eb);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
      margin-top: 8px;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.3);
    }

    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .auth-toggle button {
      background: none;
      border: none;
      color: var(--blue);
      cursor: pointer;
      padding: 0;
      font-weight: 600;
      text-decoration: underline;
      font-size: 0.9rem;
      box-shadow: none;
      margin: 0;
    }

    .auth-toggle button:hover {
      color: #60a5fa;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      border: 1px solid;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: rgba(244, 63, 94, 0.15);
      color: #fca5ac;
      border-color: rgba(244, 63, 94, 0.3);
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.3);
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .auth-card { padding: 30px 20px; }
      .auth-card h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Finance Tracker</h1>
      
      <div id="alertContainer" class="alert"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Masukkan email Anda" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Masukkan password Anda" required />
        </div>
        <button type="submit">Masuk</button>
      </form>

      <!-- Register Form (Hidden by default) -->
      <form id="registerForm" style="display: none;">
        <div class="form-group">
          <label for="registerName">Nama Lengkap</label>
          <input type="text" id="registerName" placeholder="Masukkan nama Anda" required />
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="Masukkan email Anda" required />
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Minimal 6 karakter" minlength="6" required />
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">Konfirmasi Password</label>
          <input type="password" id="registerConfirmPassword" placeholder="Konfirmasi password" required />
        </div>
        <button type="submit">Daftar</button>
      </form>

      <div class="auth-toggle">
        <p>
          <span id="toggleText">Belum punya akun?</span>
          <button type="button" id="toggleBtn">Daftar sekarang</button>
        </p>
      </div>
    </div>
  </div>

  <script>
    class Auth {
      constructor() {
        this.usersKey = 'financeTrackerUsers';
        this.currentUserKey = 'financeTrackerCurrentUser';
      }

      getUsers() {
        return JSON.parse(localStorage.getItem(this.usersKey) || '{}');
      }

      saveUsers(users) {
        localStorage.setItem(this.usersKey, JSON.stringify(users));
      }

      setCurrentUser(user) {
        if (user) {
          localStorage.setItem(this.currentUserKey, JSON.stringify(user));
        } else {
          localStorage.removeItem(this.currentUserKey);
        }
      }

      register(name, email, password) {
        const users = this.getUsers();
        
        if (users[email]) {
          return { success: false, message: 'Email sudah terdaftar' };
        }

        if (password.length < 6) {
          return { success: false, message: 'Password minimal 6 karakter' };
        }

        users[email] = {
          id: crypto.randomUUID(),
          name,
          email,
          password: btoa(password),
          createdAt: new Date().toISOString()
        };

        this.saveUsers(users);
        return { success: true, message: 'Pendaftaran berhasil' };
      }

      login(email, password) {
        const users = this.getUsers();
        const user = users[email];

        if (!user) {
          return { success: false, message: 'Email tidak ditemukan' };
        }

        if (user.password !== btoa(password)) {
          return { success: false, message: 'Password salah' };
        }

        const currentUser = {
          id: user.id,
          name: user.name,
          email: user.email
        };

        this.setCurrentUser(currentUser);
        return { success: true, message: 'Login berhasil', user: currentUser };
      }
    }

    const auth = new Auth();
    let isLoginMode = true;

    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toggleBtn = document.getElementById('toggleBtn');
    const toggleText = document.getElementById('toggleText');
    const alertContainer = document.getElementById('alertContainer');

    function showAlert(message, type = 'error') {
      alertContainer.textContent = message;
      alertContainer.className = `alert show alert-${type}`;
      setTimeout(() => {
        alertContainer.className = 'alert';
      }, 4000);
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      if (isLoginMode) {
        loginForm.style.display = 'grid';
        registerForm.style.display = 'none';
        toggleText.textContent = 'Belum punya akun?';
        toggleBtn.textContent = 'Daftar sekarang';
      } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'grid';
        toggleText.textContent = 'Sudah punya akun?';
        toggleBtn.textContent = 'Masuk';
      }
      alertContainer.className = 'alert';
    }

    toggleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      toggleAuthMode();
    });

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const result = auth.login(email, password);
      if (result.success) {
        showAlert(result.message, 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } else {
        showAlert(result.message, 'error');
      }
    });

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;

      if (password !== confirmPassword) {
        showAlert('Password tidak cocok', 'error');
        return;
      }

      const result = auth.register(name, email, password);
      if (result.success) {
        showAlert(result.message, 'success');
        setTimeout(() => {
          toggleAuthMode();
          registerForm.reset();
          document.getElementById('registerConfirmPassword').value = '';
        }, 1000);
      } else {
        showAlert(result.message, 'error');
      }
    });
  </script>
</body>
</html>
